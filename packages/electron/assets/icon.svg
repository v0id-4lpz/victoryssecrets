<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- Shield — large, centered -->
  <path d="M512 100 L820 240 C820 240 850 600 512 920 C174 600 204 240 204 240 Z" fill="url(#shieldFill)"/>
  <path d="M512 140 L790 265 C790 265 816 580 512 880 C208 580 234 265 234 265 Z" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="8"/>
  <!-- Lock inside shield -->
  <g transform="translate(512, 500)">
    <!-- Lock body -->
    <rect x="-80" y="-20" width="160" height="120" rx="20" fill="white" opacity="0.9"/>
    <!-- Lock shackle -->
    <path d="M-48,-20 L-48,-70 A48,48 0 0,1 48,-70 L48,-20" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
    <!-- Keyhole -->
    <circle cx="0" cy="30" r="18" fill="url(#bg)"/>
    <rect x="-8" y="40" width="16" height="30" rx="4" fill="url(#bg)"/>
  </g>
</svg>
